<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frattale TREE</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section style="max-width: 1300px;">
            <h2>Frattale TREE</h2>
            <div class="slidercontainer">
                <p>LENGTH</p>
                <input type="range" min="1" max="500" value="350" class="slider" id="tLen">
            </div>
            <div class="slidercontainer">
                <p>ANGLE</p>
                <input type="range" min="1" max="360" value="90" class="slider" id="tAng">
            </div>
            <div class="slidercontainer">
                <p>REPS</p>
                <input type="range" min="1" max="20" value="10" class="slider" id="tReps">
            </div>
            <canvas id="triangles" width="1200" height="900" style="background-color: #f0f0f0;"></canvas>
            <br><br>
            <a href="index.html" class="button">Back to Home</a>
        </section>
    </main>

    <script>
        const canvas = document.querySelector("#triangles");
        const ctx = canvas.getContext("2d");

        ctx.strokeStyle = "black";
        ctx.lineWidth = 1;

        const lenSl = document.querySelector("#tLen");
        const angSl = document.querySelector("#tAng");
        const repsSl = document.querySelector("#tReps")

        const Turtle = {
            posX: 600,
            posY: 800,
            angle: -90 * Math.PI / 180,

            drawLine(x, y) {
                ctx.beginPath();
                ctx.moveTo(this.posX, this.posY);
                ctx.lineTo(x, y);
                ctx.stroke();
                this.posX = x;
                this.posY = y;
            },

            forward(len) {
                const newX = this.posX + len * Math.cos(this.angle);
                const newY = this.posY + len * Math.sin(this.angle);
                this.drawLine(newX, newY);
            },

            turn(deg) {
                this.angle += deg * Math.PI / 180;
            },

            tree(reps, len) {
                let ang = parseFloat(angSl.value);

                if (reps === 0) return;

                this.forward(len);

                const x = this.posX;
                const y = this.posY;
                const a = this.angle;

                this.turn(-ang);
                this.tree(reps - 1, len * 0.7);

                this.posX = x;
                this.posY = y;
                this.angle = a;

                this.turn(ang);
                this.tree(reps - 1, len * 0.7);

                this.posX = x;
                this.posY = y;
                this.angle = a;
            }
        };

        function drawTree() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            Turtle.posX = 600;
            Turtle.posY = 800;
            Turtle.angle = -90 * Math.PI / 180;

            Turtle.tree(parseFloat(repsSl.value), parseFloat(lenSl.value));
        }

        lenSl.addEventListener("input", drawTree);
        angSl.addEventListener("input", drawTree);
        repsSl.addEventListener("input", drawTree);

        drawTree();
    </script>
</body>

</html>
