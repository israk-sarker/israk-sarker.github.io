<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turtle Triangle - Koch Snowflake</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section style="max-width: 1300px;">
            <h3>Frattale di Von Koch</h3>
            <div class="slidercontainer">
                <p>REPS</p>
                <input type="range" min="0" max="5" value="3" class="slider" id="tReps">
            </div>
            <canvas id="triangles" width="1200" height="900" style="background-color: #f0f0f0;"></canvas>
            <br><br>
            <a href="index.html" class="button">Back to Home</a>
        </section>
    </main>

    <script>
        const canvas = document.querySelector("#triangles");
        const ctx = canvas.getContext("2d");

        const tReps = document.querySelector("#tReps");

        const Turtle = {
            posX: 350,
            posY: 250,
            angle: 0,
            L: 500,

            drawLine(x, y) {
                ctx.beginPath();
                ctx.moveTo(this.posX, this.posY);
                ctx.lineTo(x, y);
                ctx.stroke();
                this.posX = x;
                this.posY = y;
            },

            forward(len) {
                const newX = this.posX + len * Math.cos(this.angle);
                const newY = this.posY + len * Math.sin(this.angle);
                this.drawLine(newX, newY);
            },

            turn(deg) {
                this.angle += deg * Math.PI / 180;
            },

            recTriangles(len, n) {
                if (n === 0) {
                    this.forward(len);
                } else {

                    const side = len / 3;

                    this.recTriangles(side, n - 1);
                    this.turn(-60);

                    this.recTriangles(side, n - 1);
                    this.turn(120);

                    this.recTriangles(side, n - 1);
                    this.turn(-60);

                    this.recTriangles(side, n - 1);
                }
            },

            drawEquilateralTriangle(depth) {
                for (let i = 0; i < 3; i++) {
                    this.recTriangles(this.L, depth);
                    this.turn(120);
                }
            }
        };

        function drawSnowflake() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            Turtle.posX = 350;
            Turtle.posY = 250;
            Turtle.angle = 0;

            Turtle.drawEquilateralTriangle(parseInt(tReps.value));
        }

        tReps.addEventListener("input", drawSnowflake);

        drawSnowflake();
    </script>
</body>

</html>
